services:
  # ── Frontend (nginx + static files) ─────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${WT_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend API (FastAPI + uvicorn) ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    volumes:
      - upload_data:/app/uploads
      - output_data:/app/outputs
      - db_data:/app/data
    env_file: .env
    environment:
      - WT_DATABASE_URL=sqlite+aiosqlite:///./data/wind_translator.db
      - WT_REDIS_URL=redis://redis:6379/0
      - WT_UPLOAD_DIR=/app/uploads
      - WT_OUTPUT_DIR=/app/outputs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: ["celery", "-A", "server.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - upload_data:/app/uploads
      - output_data:/app/outputs
      - db_data:/app/data
    env_file: .env
    environment:
      - WT_DATABASE_URL=sqlite+aiosqlite:///./data/wind_translator.db
      - WT_REDIS_URL=redis://redis:6379/0
      - WT_UPLOAD_DIR=/app/uploads
      - WT_OUTPUT_DIR=/app/outputs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A server.tasks.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  upload_data:
  output_data:
  db_data:
  redis_data:
